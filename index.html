<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adega EVO - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="login-card p-5">
                    <div class="text-center mb-4">
                        <i class="fas fa-wine-glass-alt fa-4x badge-pulse"></i>
                        <h2 class="mt-3">Adega EVO</h2>
                        <p class="text-muted">Sistema Profissional para Adega</p>
                    </div>
                    
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label">Usuário</label>
                            <input type="text" class="form-control" id="username" value="admin" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Senha</label>
                            <input type="password" class="form-control" id="password" value="adm123" required>
                        </div>
                        <button type="submit" class="btn btn-accent w-100 mb-3">Entrar</button>
                    </form>
                    
                    <div class="text-center">
                        <a href="#" data-bs-toggle="modal" data-bs-target="#resetModal" class="text-muted small">
                            Esqueci minha senha
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Reset Senha -->
    <div class="modal fade" id="resetModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Resetar Senha</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>Uma nova senha temporária será enviada para o e-mail cadastrado.</p>
                    <div class="mb-3">
                        <label class="form-label">E-mail</label>
                        <input type="email" class="form-control" id="resetEmail" placeholder="admin@adega.com">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-danger" onclick="resetSenha()">Enviar Nova Senha</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (username === 'admin' && password === 'adm123') {
                localStorage.setItem('loggedIn', 'true');
                window.location.href = 'produtos.html';
            } else {
                alert('Usuário ou senha inválidos!');
            }
        });

        function resetSenha() {
            const email = document.getElementById('resetEmail').value;
            if (email) {
                alert('Nova senha temporária enviada para ' + email + '\nNova senha: adm123 (alterar após login)');
                bootstrap.Modal.getInstance(document.getElementById('resetModal')).hide();
            } else {
                alert('Digite um e-mail válido');
            }
        }
    </script>
</body>
</html>
