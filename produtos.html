<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adega EVO - Produtos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        .product-card {
            transition: all 0.3s;
        }
        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .vencido {
            border: 2px solid #dc3545;
        }
    </style>
</head>
<body class="bg-dark text-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-black">
        <div class="container">
            <a class="navbar-brand" href="#"><i class="fas fa-wine-glass-alt"></i> Adega EVO</a>
            <div class="navbar-nav">
                <a class="nav-link" href="produtos.html">Produtos</a>
                <a class="nav-link" href="cadastro.html">Cadastrar</a>
                <a class="nav-link" href="promoção.html">Promoções</a>
                <a class="nav-link text-danger" href="login.html">Sair</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>Estoque de Produtos</h2>
        <div class="row" id="produtosContainer"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let produtos = JSON.parse(localStorage.getItem('produtos')) || [
            {
                id: 1,
                nome: "Vinho Tinto Cabernet Sauvignon",
                preco: 89.90,
                imagem: "https://picsum.photos/id/201/300/300",
                vencimento: "2026-12-15",
                quantidade: 45
            },
            {
                id: 2,
                nome: "Espumante Brut",
                preco: 129.90,
                imagem: "https://picsum.photos/id/237/300/300",
                vencimento: "2025-08-20",
                quantidade: 18
            }
        ];

        function salvarProdutos() {
            localStorage.setItem('produtos', JSON.stringify(produtos));
        }

        function renderProdutos() {
            const container = document.getElementById('produtosContainer');
            container.innerHTML = '';
            
            produtos.forEach(prod => {
                const hoje = new Date();
                const venc = new Date(prod.vencimento);
                const dias = Math.ceil((venc - hoje) / (1000*60*60*24));
                const isVencido = dias < 0;
                
                const card = `
                    <div class="col-md-4 col-lg-3 mb-4">
                        <div class="card product-card bg-secondary text-light h-100 ${isVencido ? 'vencido' : ''}">
                            <img src="${prod.imagem}" class="card-img-top" style="height: 220px; object-fit: cover;">
                            <div class="card-body">
                                <h5 class="card-title">${prod.nome}</h5>
                                <p class="fs-4 fw-bold text-warning">R$ ${prod.preco.toFixed(2)}</p>
                                <p><strong>Estoque:</strong> ${prod.quantidade} un</p>
                                <p>
                                    <strong>Vencimento:</strong> 
                                    <span class="${isVencido ? 'text-danger' : 'text-success'}">
                                        ${prod.vencimento} ${dias < 30 ? '(Alerta!)' : ''}
                                    </span>
                                </p>
                            </div>
                            <div class="card-footer bg-transparent border-0">
                                <button class="btn btn-sm btn-outline-light" onclick="editarProduto(${prod.id})">Editar</button>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });
        }

        function editarProduto(id) {
            alert('Funcionalidade de edição em desenvolvimento.\n\nProduto ID: ' + id);
        }

        // Inicialização
        renderProdutos();
    </script>
</body>
</html>
